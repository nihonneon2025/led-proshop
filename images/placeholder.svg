<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- White background with subtle border -->
  <rect x="0" y="0" width="400" height="400" fill="#ffffff"/>
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Camera icon, centered upper -->
  <g transform="translate(200, 160)" stroke="#cbd5e1" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Camera body -->
    <rect x="-60" y="-20" width="120" height="80" rx="6" ry="6"/>
    <!-- Top hump -->
    <path d="M -28 -20 L -22 -32 L 22 -32 L 28 -20"/>
    <!-- Lens outer -->
    <circle cx="0" cy="22" r="24"/>
    <!-- Lens inner -->
    <circle cx="0" cy="22" r="10"/>
    <!-- Shutter indicator -->
    <circle cx="42" cy="-8" r="3" fill="#cbd5e1"/>
  </g>

  <!-- Main text: 画像準備中 -->
  <text x="200" y="290" font-family="'Yu Gothic UI', 'Hiragino Sans', 'Meiryo', sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#64748b">画像準備中</text>

  <!-- Subtitle -->
  <text x="200" y="325" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#94a3b8" letter-spacing="1.5">Image Coming Soon</text>
</svg>
